name: Build installers

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

# electron-builder reads GH_TOKEN to decide whether to publish. We never want
# the build jobs to publish — only the dedicated release job (gated on tags).
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WHISPER_RELEASE: v1.7.6   # pin so a future whisper.cpp asset rename doesn't break us

jobs:
  # =============================================================
  #  macOS build → .dmg
  # =============================================================
  build-mac:
    name: Build macOS .dmg
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system tools
        run: brew install cmake ffmpeg

      # Note: the 3 GB Whisper model is NOT bundled in the installer. The app
      # downloads it on first launch (lands in the user's userData folder).
      # This keeps the .dmg under GitHub Releases' 2 GB per-asset cap.

      - name: Build whisper.cpp
        run: |
          cd resources/whisper
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j --config Release --target whisper-cli
          ls -lh build/bin/whisper-cli

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Import full Tamil Bible
        run: |
          curl -L -o resources/bible/tamil-ov-source.json \
            "https://raw.githubusercontent.com/godlytalias/Bible-Database/master/Tamil/bible.json"
          npm run import:bible

      - name: Build .dmg
        run: npm run package:mac

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Powerful-Weapon-macOS
          path: release/*.dmg
          retention-days: 30
          if-no-files-found: error

  # =============================================================
  #  Windows build → .exe
  # =============================================================
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Note: the 3 GB Whisper model is NOT bundled. The app downloads it
      # on first launch into the user's %APPDATA% folder.

      - name: Download Whisper Windows binary
        shell: pwsh
        run: |
          $version = "${{ env.WHISPER_RELEASE }}"
          # whisper.cpp Windows assets: try both common names
          $candidates = @(
            "https://github.com/ggerganov/whisper.cpp/releases/download/$version/whisper-bin-x64.zip",
            "https://github.com/ggerganov/whisper.cpp/releases/download/$version/whisper-blas-bin-x64.zip"
          )
          $downloaded = $false
          foreach ($url in $candidates) {
            Write-Host "Trying: $url"
            try {
              Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\whisper-win.zip" -TimeoutSec 120
              $downloaded = $true
              Write-Host "Downloaded: $url"
              break
            } catch {
              Write-Host "Not found: $url"
            }
          }
          if (-not $downloaded) { throw "Could not download any Whisper Windows binary for $version" }
          Expand-Archive -Path "$env:RUNNER_TEMP\whisper-win.zip" -DestinationPath "$env:RUNNER_TEMP\whisper-win"
          # Some zips put binaries in a subfolder, some at the root — handle both.
          $cli = Get-ChildItem -Path "$env:RUNNER_TEMP\whisper-win" -Recurse -Filter "whisper-cli.exe" | Select-Object -First 1
          if (-not $cli) {
            # Older releases ship as main.exe; rename for compatibility
            $cli = Get-ChildItem -Path "$env:RUNNER_TEMP\whisper-win" -Recurse -Filter "main.exe" | Select-Object -First 1
            if ($cli) {
              Copy-Item $cli.FullName "$($cli.DirectoryName)\whisper-cli.exe"
              $cli = Get-Item "$($cli.DirectoryName)\whisper-cli.exe"
            }
          }
          if (-not $cli) { throw "No whisper-cli.exe or main.exe found in the downloaded zip" }
          # Copy ONLY whisper-cli.exe and its required DLLs. The release zip
          # ships ~16 example executables (bench, server, stream, llama, etc.)
          # we don't use; skipping them saves ~50 MB.
          Copy-Item "$($cli.DirectoryName)\whisper-cli.exe" "resources\whisper\" -Force
          Copy-Item "$($cli.DirectoryName)\ggml*.dll" "resources\whisper\" -Force -ErrorAction SilentlyContinue
          Copy-Item "$($cli.DirectoryName)\whisper*.dll" "resources\whisper\" -Force -ErrorAction SilentlyContinue
          Write-Host "Files placed in resources\whisper\:"
          Get-ChildItem "resources\whisper\" | Select-Object Name, Length

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Import full Tamil Bible
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/godlytalias/Bible-Database/master/Tamil/bible.json" `
            -OutFile "resources/bible/tamil-ov-source.json"
          npm run import:bible

      - name: Build .exe
        run: npm run package:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Powerful-Weapon-Windows
          path: release/*.exe
          retention-days: 30
          if-no-files-found: error

  # =============================================================
  #  Release step (only fires when you push a tag like v0.1.0)
  # =============================================================
  release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Powerful-Weapon-macOS/*.dmg
            artifacts/Powerful-Weapon-Windows/*.exe
          generate_release_notes: true
