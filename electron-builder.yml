appId: com.andrewjohnson.powerfulweapon
productName: Powerful Weapon
copyright: Copyright (c) 2026 Andrew Johnson

directories:
  output: release
  buildResources: resources/icons

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/**/*

extraResources:
  - from: resources/bible
    to: bible
  - from: resources/whisper
    to: whisper
    filter:
      - "**/*"
      # The 3 GB Whisper model is downloaded by the app on first launch
      # (lands in userData/whisper/). Keeping it out of the installer drops
      # the .dmg from 2.9 GB → ~200 MB and the .zip to similar, both of
      # which fit comfortably inside GitHub Releases' 2 GB per-asset cap.
      - "!ggml-*.bin"

asarUnpack:
  - "**/better-sqlite3/**/*"
  - "resources/whisper/**/*"

win:
  target:
    # With the Whisper model no longer bundled (downloaded on first launch),
    # the installer payload is well under NSIS's 2 GB mmap limit — so we
    # ship a real one-click installer with Start Menu + Desktop shortcuts.
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icons/icon.png
  category: public.app-category.productivity

linux:
  target:
    - AppImage
  icon: resources/icons/icon.png
  category: Education

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Powerful Weapon
